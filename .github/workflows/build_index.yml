name: Build Index

on:
  push:
    branches: [main]
    paths:
      - 'vectorized/**'
  workflow_dispatch:

jobs:
  build_index:
    name: Build FAISS Index + Attractors
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy faiss-cpu

      - name: Build FAISS index
        run: python aureon_faiss_builder.py build vectorized aureon_index

      - name: Fit attractors
        run: python aureon_attractor_learner.py fit vectorized aureon_attractors

      - name: Write merge script
        run: |
          cat > merge_corpus.py << 'PYEOF'
          import json, pathlib
          vectorized_dir = pathlib.Path("vectorized")
          all_atoms = []
          files = sorted(vectorized_dir.glob("*_vectorized.json"))
          print(f"Merging {len(files)} files...")
          for f in files:
              try:
                  atoms = json.loads(f.read_text(encoding="utf-8"))
                  for a in atoms:
                      if "vector" in a and "text" in a:
                          all_atoms.append({
                              "uid": a["uid"],
                              "text": a["text"],
                              "source": a.get("source", ""),
                              "vector": a["vector"]
                          })
              except Exception as e:
                  print(f"  SKIP {f.name}: {e}")
          out = pathlib.Path("aureon_corpus_full.json")
          out.write_text(json.dumps(all_atoms), encoding="utf-8")
          print(f"Done. {len(all_atoms):,} atoms -> aureon_corpus_full.json ({out.stat().st_size/1e6:.1f} MB)")
          PYEOF

      - name: Export merged corpus JSON for Base44
        run: python merge_corpus.py

      - name: Commit all outputs
        run: |
          git config user.name "Nadine Squires"
          git config user.email "quantumquantara@gmail.com"
          git add aureon_index/ aureon_attractors aureon_corpus_full.json
          git diff --staged --quiet || git commit -m "[auto] Rebuild index + corpus $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
