name: Build Index

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'vectorized/**'

jobs:
  build_index:
    name: Build FAISS Index + Attractors
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy faiss-cpu

      - name: Build FAISS index
        run: python aureon_faiss_builder.py build vectorized aureon_index

      - name: Fit attractors
        run: python aureon_attractor_learner.py fit vectorized aureon_attractors

      - name: Write corpus index script
        run: |
          cat > build_corpus_index.py << 'PYEOF'
          import json, pathlib

          vectorized_dir = pathlib.Path("vectorized")
          files = sorted(vectorized_dir.glob("*_vectorized.json"))
          print(f"Indexing {len(files)} files...")

          index = []
          total = 0
          for f in files:
              try:
                  atoms = json.loads(f.read_text(encoding="utf-8"))
                  count = len([a for a in atoms if "vector" in a and "text" in a])
                  total += count
                  index.append({
                      "filename": f.name,
                      "atom_count": count,
                      "source": atoms[0].get("source", "") if atoms else ""
                  })
              except Exception as e:
                  print(f"  SKIP {f.name}: {e}")

          out = pathlib.Path("aureon_corpus_index.json")
          out.write_text(json.dumps({"total_atoms": total, "files": index}, indent=2), encoding="utf-8")
          print(f"Done. {total:,} atoms across {len(index)} files -> aureon_corpus_index.json ({out.stat().st_size/1e3:.1f} KB)")
          PYEOF

      - name: Build corpus file index
        run: python build_corpus_index.py

      - name: Commit all outputs
        run: |
          git config user.name "Nadine Squires"
          git config user.email "quantumquantara@gmail.com"
          git add aureon_index/ aureon_corpus_index.json aureon_attractors
          git diff --staged --quiet || git commit -m "[auto] Rebuild index + corpus index $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
